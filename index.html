<head>

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
scroll-behavior:smooth;
}

body{
background:#f8fafc;
color:#111827;
overflow-x:hidden;
}

/* NAVBAR */

nav{
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 15px rgba(0,0,0,0.08);
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:18px;
}

/* LOGO IMAGE */

.logo img{
height:90px;
width:auto;
object-fit:contain;
display:block;
}

/* BRAND TITLE */

.brand-title{

font-size:42px;
font-weight:900;
line-height:1;

background:linear-gradient(
90deg,
#2563eb,
#1d4ed8,
#38bdf8
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

letter-spacing:2px;
text-transform:uppercase;

text-shadow:
0 4px 15px rgba(37,99,235,0.25);

margin-bottom:6px;

}

/* SUBTITLE */

.logo-text p{
font-size:14px;
font-weight:600;
color:#64748b;
line-height:1.5;
}

nav ul{
display:flex;
list-style:none;
gap:35px;
align-items:center;
}

nav ul li a{
text-decoration:none;
font-weight:700;
font-size:18px;
color:#111827;
transition:0.3s;
}

nav ul li a:hover{
color:#2563eb;
}

/* DROPDOWN */

.dropdown{
position:relative;
}

.dropdown-menu{
position:absolute;
top:100%;
left:0;
background:white;
min-width:220px;
border-radius:15px;
padding:10px 0;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
display:none;
flex-direction:column;
z-index:1000;
}

.dropdown-menu li{
list-style:none;
}

.dropdown-menu li a{
display:block;
padding:14px 22px;
font-size:16px;
font-weight:600;
color:#111827;
text-decoration:none;
transition:0.3s;
}

.dropdown-menu li a:hover{
background:#eff6ff;
color:#2563eb;
}

.dropdown:hover .dropdown-menu{
display:flex;
}

/* HERO */

.hero{
min-height:90vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:80px 8%;
gap:50px;
flex-wrap:wrap;
background:linear-gradient(to right,#eff6ff,#ffffff);
}

.hero-text{
flex:1;
min-width:300px;
}

.hero-text h1{
font-size:68px;
line-height:1.2;
margin-bottom:25px;
font-weight:800;
}

.hero-text h1 span{
color:#2563eb;
}

.hero-text p{
font-size:20px;
line-height:1.9;
color:#475569;
margin-bottom:35px;
}

.hero-btns{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:16px 35px;
border-radius:14px;
font-weight:700;
text-decoration:none;
transition:0.3s;
display:inline-block;
border:none;
cursor:pointer;
}

.primary{
background:#2563eb;
color:white;
}

.primary:hover{
background:#1d4ed8;
transform:translateY(-3px);
}

.secondary{
border:2px solid #2563eb;
color:#2563eb;
}

.secondary:hover{
background:#2563eb;
color:white;
}

.hero-image{
flex:1;
min-width:300px;
}

.hero-image img{
width:100%;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* SECTION */

section{
padding:90px 8%;
}

.section-title{
font-size:54px;
font-weight:800;
text-align:center;
margin-bottom:60px;
}

/* SEARCH */

.search-box{
text-align:center;
margin-bottom:50px;
}

.search-box input{
width:100%;
max-width:650px;
padding:20px 24px;
border-radius:18px;
border:2px solid #dbeafe;
font-size:18px;
outline:none;
background:white;
box-shadow:0 12px 30px rgba(0,0,0,0.05);
transition:0.3s;
}

.search-box input:focus{
border-color:#2563eb;
}

/* FILTER */

.filter-wrapper{
display:flex;
justify-content:center;
margin-top:25px;
}

.filter-inner{
position:relative;
width:100%;
max-width:650px;
}

#warrantyFilter{
width:100%;
padding:20px 24px;
border-radius:18px;
border:2px solid #2563eb;
background:white;
font-size:18px;
font-weight:700;
color:#111827;
outline:none;
cursor:pointer;
appearance:none;
box-shadow:0 12px 30px rgba(37,99,235,0.12);
}

.filter-arrow{
position:absolute;
right:24px;
top:50%;
transform:translateY(-50%);
pointer-events:none;
font-size:22px;
color:#2563eb;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
gap:35px;
}

.product-card{
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:0.4s;
position:relative;
}

.product-card:hover{
transform:translateY(-10px);
}

.product-card img{
width:100%;
height:320px;
object-fit:contain;
background:#f1f5f9;
padding:20px;
transition:0.4s;
cursor:zoom-in;
}

.product-card:hover img{
transform:scale(1.08);
}

.condition-badge{
position:absolute;
top:15px;
left:15px;
padding:10px 18px;
border-radius:30px;
font-size:14px;
font-weight:700;
color:white;
z-index:2;
}

.brand-new{
background:#16a34a;
}

.refurbished{
background:#dc2626;
}

.product-info{
padding:30px;
}

.product-info h3{
font-size:28px;
line-height:1.5;
margin-bottom:18px;
min-height:90px;
}

.price{
font-size:40px;
font-weight:800;
color:#2563eb;
margin-bottom:15px;
}

.stock{
color:red;
font-size:16px;
font-weight:700;
margin-bottom:20px;
}

/* WARRANTY */

.warranty-box{
display:inline-flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
padding:12px 20px;
border-radius:14px;
font-size:15px;
font-weight:700;
margin-bottom:18px;
box-shadow:0 10px 25px rgba(37,99,235,0.25);
animation:pulse 2s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.04);
}

100%{
transform:scale(1);
}

}

.spec-table{
width:100%;
margin-bottom:20px;
}

.spec-table td{
padding:10px 0;
border-bottom:1px solid #e2e8f0;
font-size:15px;
}

.spec-table td:first-child{
font-weight:700;
width:45%;
}

.feature-list{
padding-left:20px;
line-height:2;
margin-bottom:25px;
color:#475569;
}

/* ABOUT */

.about-box{
background:white;
padding:60px;
border-radius:25px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-align:center;
}

.about-box p{
font-size:20px;
line-height:2;
color:#475569;
}

/* CONTACT */

.contact{
background:#111827;
color:white;
border-radius:25px;
padding:60px;
text-align:center;
}

.contact h2{
font-size:46px;
margin-bottom:20px;
}

.contact p{
margin-bottom:12px;
color:#d1d5db;
font-size:17px;
}

/* FOOTER */

footer{
background:#0f172a;
color:#94a3b8;
padding:25px;
text-align:center;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25d366;
width:70px;
height:70px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:34px;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
z-index:999;
}

/* MOBILE */

@media(max-width:768px){

.hero-text h1{
font-size:42px;
}

nav{
flex-direction:column;
gap:20px;
}

.logo{
flex-direction:column;
text-align:center;
gap:8px;
}

.logo img{
height:65px;
}

.brand-title{
font-size:28px;
text-align:center;
}

.logo-text p{
font-size:12px;
}

nav ul{
flex-wrap:wrap;
justify-content:center;
}

.section-title{
font-size:38px;
}

.products{
grid-template-columns:1fr;
}

}

</style>

</head>
