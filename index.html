<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
RCS TECH WORLD | Premium Refurbished & New Laptops
</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
scroll-behavior:smooth;
}

body{
background:#f8fafc;
color:#111827;
overflow-x:hidden;
}

/* NAVBAR */

nav{
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 15px rgba(0,0,0,0.08);
}

.logo img{
height:90px;
width:auto;
object-fit:contain;
display:block;
}

nav ul{
display:flex;
list-style:none;
gap:35px;
align-items:center;
}

nav ul li a{
text-decoration:none;
font-weight:700;
font-size:18px;
color:#111827;
transition:0.3s;
}

nav ul li a:hover{
color:#2563eb;
}

/* HERO */

.hero{
min-height:90vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:80px 8%;
gap:50px;
flex-wrap:wrap;
background:linear-gradient(to right,#eff6ff,#ffffff);
}

.hero-text{
flex:1;
min-width:300px;
}

.hero-text h1{
font-size:68px;
line-height:1.2;
margin-bottom:25px;
font-weight:800;
}

.hero-text h1 span{
color:#2563eb;
}

.hero-text p{
font-size:20px;
line-height:1.9;
color:#475569;
margin-bottom:35px;
}

.hero-btns{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:16px 35px;
border-radius:14px;
font-weight:700;
text-decoration:none;
transition:0.3s;
display:inline-block;
border:none;
cursor:pointer;
}

.primary{
background:#2563eb;
color:white;
}

.primary:hover{
background:#1d4ed8;
transform:translateY(-3px);
}

.secondary{
border:2px solid #2563eb;
color:#2563eb;
}

.secondary:hover{
background:#2563eb;
color:white;
}

.hero-image{
flex:1;
min-width:300px;
}

.hero-image img{
width:100%;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* SECTION */

section{
padding:90px 8%;
}

.section-title{
font-size:54px;
font-weight:800;
text-align:center;
margin-bottom:60px;
}

/* SEARCH */

.search-box{
text-align:center;
margin-bottom:50px;
}

.search-box input{
width:100%;
max-width:650px;
padding:20px 24px;
border-radius:18px;
border:2px solid #dbeafe;
font-size:18px;
outline:none;
background:white;
box-shadow:0 12px 30px rgba(0,0,0,0.05);
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
gap:35px;
}

.product-card{
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:0.4s;
position:relative;
}

.product-card:hover{
transform:translateY(-10px);
}

.product-card img{
width:100%;
height:320px;
object-fit:contain;
background:#f1f5f9;
padding:20px;
transition:transform 0.5s ease;
cursor:zoom-in;
}

.product-card:hover img{
transform:scale(1.15);
}

.product-card img:active{
transform:scale(1.25);
}

.condition-badge{
position:absolute;
top:15px;
left:15px;
padding:10px 18px;
border-radius:30px;
font-size:14px;
font-weight:700;
color:white;
z-index:2;
}

.brand-new{
background:#16a34a;
}

.refurbished{
background:#dc2626;
}

.product-info{
padding:30px;
}

.product-info h3{
font-size:28px;
line-height:1.5;
margin-bottom:18px;
}

.price{
font-size:40px;
font-weight:800;
color:#2563eb;
margin-bottom:15px;
}

.stock{
color:red;
font-size:16px;
font-weight:700;
margin-bottom:20px;
}

.warranty-box{
display:inline-flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
padding:12px 20px;
border-radius:14px;
font-size:15px;
font-weight:700;
margin-bottom:18px;
}

.spec-table{
width:100%;
margin-bottom:20px;
}

.spec-table td{
padding:10px 0;
border-bottom:1px solid #e2e8f0;
font-size:15px;
}

.spec-table td:first-child{
font-weight:700;
width:45%;
}

/* IMAGE POPUP */

.image-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
padding:20px;
cursor:zoom-out;
}

.image-popup img{
max-width:95%;
max-height:95%;
border-radius:20px;
background:white;
padding:10px;
object-fit:contain;
animation:zoomIn 0.3s ease;
}

@keyframes zoomIn{

from{
transform:scale(0.7);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

/* MOBILE */

@media(max-width:768px){

.hero-text h1{
font-size:42px;
}

nav{
flex-direction:column;
gap:20px;
}

.logo img{
height:65px;
}

nav ul{
flex-wrap:wrap;
justify-content:center;
}

.section-title{
font-size:38px;
}

.products{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo">

<img src="https://github.com/rcstechworld/rcstechworld.github.io/blob/main/images/logo.png?raw=true">

</div>

<ul>

<li><a href="#">Home</a></li>

<li><a href="#products">Products</a></li>

<li><a href="#contact">Contact</a></li>

</ul>

</nav>

<!-- HERO -->

<section class="hero">

<div class="hero-text">

<h1>
RCS TECH WORLD
<br>
<span>Premium Laptops</span>
</h1>

<p>
Buy premium Brand New & Refurbished laptops with warranty and pan India support.
</p>

<div class="hero-btns">

<a href="#products" class="btn primary">
Shop Now
</a>

<a href="https://wa.me/918168411895" class="btn secondary">
WhatsApp Us
</a>

</div>

</div>

<div class="hero-image">

<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=1200&auto=format&fit=crop">

</div>

</section>

<!-- PRODUCTS -->

<section id="products">

<h2 class="section-title">
Our Products
</h2>

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="Search Dell, HP, Lenovo...">

</div>

<div class="products" id="products-container">
</div>

</section>

<!-- CONTACT -->

<section id="contact">

<h2 class="section-title">
Contact Us
</h2>

<p style="text-align:center;font-size:20px;">
📞 +91 8168411895
<br><br>
RCS TECH WORLD
<br>
Uttam Nagar, New Delhi
</p>

</section>

<footer style="background:#0f172a;color:white;padding:25px;text-align:center;">

© 2019 RCS TECH WORLD | All Rights Reserved

</footer>

<!-- IMAGE POPUP -->

<div class="image-popup" id="imagePopup" onclick="closeImage()">

<img id="popupImage">

</div>

<script>

const products = [

{
brand:"Dell",
model:"Latitude 7490",
processor:"Intel i7",
ram:"16GB",
ssd:"512GB SSD",
screen:"14 Inch",
price:"28999",
condition:"Refurbished",
stock:"Only Few Left",
warranty:"6 Months Warranty",
image:"https://cdn.pixabay.com/photo/2014/05/02/21/50/laptop-336369_1280.jpg"
},

{
brand:"HP",
model:"EliteBook",
processor:"Intel i5",
ram:"8GB",
ssd:"256GB SSD",
screen:"14 Inch",
price:"24999",
condition:"Brand New",
stock:"In Stock",
warranty:"1 Year Warranty",
image:"https://cdn.pixabay.com/photo/2015/01/21/14/14/apple-606761_1280.jpg"
}

];

function displayProducts(items){

let html = "";

items.forEach(product=>{

html += `

<div class="product-card">

<div class="condition-badge ${product.condition === 'Brand New' ? 'brand-new' : 'refurbished'}">

${product.condition}

</div>

<img src="${product.image}"
alt="${product.brand}"
onclick="openImage('${product.image}')">

<div class="product-info">

<h3>
${product.brand} ${product.model}
</h3>

<div class="price">
₹${product.price}
</div>

<div class="stock">
🔥 ${product.stock}
</div>

<div class="warranty-box">
🛡 ${product.warranty}
</div>

<table class="spec-table">

<tr>
<td>Processor</td>
<td>${product.processor}</td>
</tr>

<tr>
<td>RAM</td>
<td>${product.ram}</td>
</tr>

<tr>
<td>Storage</td>
<td>${product.ssd}</td>
</tr>

<tr>
<td>Screen</td>
<td>${product.screen}</td>
</tr>

</table>

<a href="https://wa.me/918168411895"
class="btn primary">

Enquire Now

</a>

</div>

</div>

`;

});

document.getElementById("products-container").innerHTML = html;

}

displayProducts(products);

/* SEARCH */

document.getElementById("searchInput").addEventListener("keyup",function(){

const value = this.value.toLowerCase();

const filtered = products.filter(product=>

product.brand.toLowerCase().includes(value)

||

product.model.toLowerCase().includes(value)

);

displayProducts(filtered);

});

/* IMAGE ZOOM */

function openImage(imageSrc){

document.getElementById("imagePopup").style.display = "flex";

document.getElementById("popupImage").src = imageSrc;

}

function closeImage(){

document.getElementById("imagePopup").style.display = "none";

}

</script>

</body>
</html>
