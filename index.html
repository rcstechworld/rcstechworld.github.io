<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIHC0Ww4wCdi7Tx5Xqhye4ljZ5nsM849ghAxvdNMr2Fp3iV5pcO6HGA1oQeePNx4mJd8KALMIyrglx/pub?output=csv";

let allProducts = [];

async function loadProducts(){

    const response = await fetch(sheetURL);
    const data = await response.text();

    const rows = data.split("\n").slice(1);

    allProducts = [];

    const uniqueSKU = new Set();

    rows.forEach(row => {

        const cols = row.split(",");

        if(cols.length > 16){

            const sku = cols[10]?.trim();

            // prevent duplicate SKU

            if(!uniqueSKU.has(sku)){

                uniqueSKU.add(sku);

                allProducts.push({

                    category: cols[1]?.trim(),
                    brand: cols[2]?.trim(),
                    model: cols[3]?.trim(),
                    processor: cols[4]?.trim(),
                    ram: cols[5]?.trim(),
                    ssd: cols[6]?.trim(),
                    screen: cols[7]?.trim(),
                    touch: cols[8]?.trim(),
                    price: cols[9]?.trim(),
                    sku: cols[10]?.trim(),

                    image: cols[11]?.trim() ||

                    "https://cdn.pixabay.com/photo/2014/05/02/21/50/laptop-336369_1280.jpg",

                    os: cols[12]?.trim() || "Windows Pro",

                    webcam: cols[13]?.trim() || "Yes",

                    warranty: cols[14]?.trim() ||

                    "3 Years Warranty",

                    cpu: cols[15]?.trim() || "1.80 GHz",

                    stock: cols[16]?.trim() ||

                    "Only Few Left"

                });

            }

        }

    });

    displayProducts(allProducts);

}

function displayProducts(products){

    let html = "";

    products.forEach(product => {

        html += `

        <div class="product-card">

            <img src="${product.image}"
            alt="${product.model}">

            <div class="product-info">

                <h3>

                Refurbished ${product.brand}
                ${product.model}

                </h3>

                <div class="price">

                    ₹${product.price}

                </div>

                <div class="stock">

                    🔥 ${product.stock}

                </div>

                <table class="spec-table">

                    <tr>
                        <td>SKU</td>
                        <td>${product.sku}</td>
                    </tr>

                    <tr>
                        <td>Brand</td>
                        <td>${product.brand}</td>
                    </tr>

                    <tr>
                        <td>Category</td>
                        <td>${product.category}</td>
                    </tr>

                    <tr>
                        <td>Processor</td>
                        <td>${product.processor}</td>
                    </tr>

                    <tr>
                        <td>CPU Speed</td>
                        <td>${product.cpu}</td>
                    </tr>

                    <tr>
                        <td>RAM</td>
                        <td>${product.ram}</td>
                    </tr>

                    <tr>
                        <td>Storage</td>
                        <td>${product.ssd}</td>
                    </tr>

                    <tr>
                        <td>Screen</td>
                        <td>${product.screen}</td>
                    </tr>

                    <tr>
                        <td>Touch Screen</td>
                        <td>${product.touch}</td>
                    </tr>

                    <tr>
                        <td>Operating System</td>
                        <td>${product.os}</td>
                    </tr>

                    <tr>
                        <td>Webcam</td>
                        <td>${product.webcam}</td>
                    </tr>

                </table>

                <ul class="feature-list">

                    <li>

                    ${product.warranty}

                    </li>

                    <li>
                    Battery & Adapter Covered
                    </li>

                    <li>
                    Pan India Support
                    </li>

                </ul>

                <a href="https://wa.me/918168411895?text=I am interested in ${product.brand} ${product.model}"

                class="btn primary">

                Enquire Now

                </a>

            </div>

        </div>

        `;

    });

    document.getElementById("product-list").innerHTML = html;

}

document.getElementById("searchInput").addEventListener("keyup", function(){

    const value = this.value.toLowerCase();

    const filtered = allProducts.filter(product =>

        product.brand.toLowerCase().includes(value) ||
        product.model.toLowerCase().includes(value) ||
        product.processor.toLowerCase().includes(value) ||
        product.category.toLowerCase().includes(value)

    );

    displayProducts(filtered);

});

loadProducts();

</script>
