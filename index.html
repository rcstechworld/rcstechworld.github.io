<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTIHC0Ww4wCdi7Tx5Xqhye4ljZ5nsM849ghAxvdNMr2Fp3iV5pcO6HGA1oQeePNx4mJd8KALMIyrglx/pub?output=csv";

let allProducts = [];

/* LOAD PRODUCTS */

function loadProducts(){

Papa.parse(sheetURL, {

download: true,
header: true,

complete: function(results){

const rows = results.data;

allProducts = [];

const uniqueSKU = new Set();

rows.forEach(product => {

const sku =
product.SKU ||
product.sku ||
"";

if(sku && !uniqueSKU.has(sku)){

uniqueSKU.add(sku);

allProducts.push({

condition:
product.Condition ||
product.condition ||
"Refurbished",

category:
product.Category ||
product.category ||
"",

brand:
product.Brand ||
product.brand ||
"",

model:
product.Model ||
product.model ||
"",

processor:
product.Processor ||
product.processor ||
"",

ram:
product.RAM ||
product.ram ||
"",

ssd:
product["HDD/SSD"] ||
product.Storage ||
product.storage ||
"",

screen:
product.Screen ||
product.screen ||
"",

touch:
product.Touch ||
product.touch ||
"",

price:
product["Base Price"] ||
product.Price ||
product.price ||
"",

sku:
sku,

image:
product["Image URL"] ||
product.image ||
"https://cdn.pixabay.com/photo/2014/05/02/21/50/laptop-336369_1280.jpg",

os:
product.OS ||
product.os ||
"Windows Pro",

webcam:
product.Webcam ||
product.webcam ||
"Yes",

warranty:
product.Warranty ||
product.warranty ||
"",

cpu:
product["CPU Speed"] ||
product.cpu ||
"1.80 GHz",

stock:
product.Stock ||
product.stock ||
"Only Few Left"

});

}

});

displayProducts(allProducts);

}

});

}

/* DISPLAY PRODUCTS */

function displayProducts(products){

let html = "";

if(products.length === 0){

html = `

<div style="
grid-column:1/-1;
text-align:center;
padding:60px;
font-size:28px;
font-weight:700;
">

No Products Found

</div>

`;

document.getElementById("product-list")
.innerHTML = html;

return;

}

products.forEach(product => {

html += `

<div class="product-card">

<img src="${product.image}"
alt="${product.brand} ${product.model}">

<div class="product-info">

<h3>
${product.condition}
${product.brand}
${product.model}
</h3>

<div class="price">
₹${product.price}
</div>

<div class="stock">
🔥 ${product.stock}
</div>

<table class="spec-table">

<tr>
<td>Processor</td>
<td>${product.processor}</td>
</tr>

<tr>
<td>RAM</td>
<td>${product.ram}</td>
</tr>

<tr>
<td>Storage</td>
<td>${product.ssd}</td>
</tr>

<tr>
<td>Screen</td>
<td>${product.screen}</td>
</tr>

<tr>
<td>OS</td>
<td>${product.os}</td>
</tr>

<tr>
<td>SKU</td>
<td>${product.sku}</td>
</tr>

</table>

<ul class="feature-list">

${product.warranty ?
`<li>🛡 ${product.warranty}</li>` : ""}

<li>Battery & Adapter Covered</li>

<li>Pan India Support</li>

</ul>

<a href="https://wa.me/918168411895?text=Hello RCS TECH WORLD,%0A%0AI am interested in:%0A%0AProduct: ${product.brand} ${product.model}%0ASKU: ${product.sku}%0APrice: ₹${product.price}"

class="btn primary">

Enquire Now

</a>

</div>

</div>

`;

});

document.getElementById("product-list")
.innerHTML = html;

}

/* FILTER PRODUCTS */

function filterProducts(){

const searchValue =
document.getElementById("searchInput")
.value.toLowerCase();

const warrantyValue =
document.getElementById("warrantyFilter")
.value.toLowerCase();

const filtered = allProducts.filter(product => {

const matchesSearch =

(product.brand || "")
.toLowerCase()
.includes(searchValue) ||

(product.model || "")
.toLowerCase()
.includes(searchValue) ||

(product.processor || "")
.toLowerCase()
.includes(searchValue) ||

(product.category || "")
.toLowerCase()
.includes(searchValue) ||

(product.condition || "")
.toLowerCase()
.includes(searchValue);

const matchesWarranty =

!warrantyValue ||

(product.warranty || "")
.toLowerCase()
.includes(warrantyValue);

return matchesSearch && matchesWarranty;

});

displayProducts(filtered);

}

/* EVENTS */

document.getElementById("searchInput")
.addEventListener("keyup", filterProducts);

document.getElementById("warrantyFilter")
.addEventListener("change", filterProducts);

/* LOAD DATA */

loadProducts();

</script>
